[build]
  command = "npm ci && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  # VITE_API_BASE_URL must be set in the Netlify UI → Site configuration → Environment variables.
  # Set it to your Render backend URL, e.g. https://pharmazine.onrender.com
  # Do NOT commit real keys here — use the Netlify dashboard for secrets.

# SPA fallback — all routes served by index.html so React Router handles them
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers applied to every response
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://pharmazine.onrender.com; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:;"

# Long-cache for immutable hashed assets produced by Vite
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
