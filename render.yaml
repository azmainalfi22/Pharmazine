# Render Blueprint — sync from repo or mirror these settings in the dashboard.
# Root directory MUST be `backend` so `uvicorn main:app` and `requirements.txt` resolve.
# Set secrets (DATABASE_URL, Supabase keys, CORS_ORIGINS, etc.) in the dashboard only.
# https://render.com/docs/blueprint-spec
version: "1"
services:
  - type: web
    name: pharmazine-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
