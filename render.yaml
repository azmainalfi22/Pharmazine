# Render Blueprint — set env vars in the Render dashboard (do not commit secrets).
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: pharmazine-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
